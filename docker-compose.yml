services:
  backrest:
    image: garethgeorge/backrest:v1.13.0
    container_name: backrest
    restart: unless-stopped
    ports:
      - "9898:9898/tcp"
    environment:
      - BACKREST_PORT=0.0.0.0:9898
      - BACKREST_DATA=/data
      - BACKREST_CONFIG=/config/config.json
      - XDG_CACHE_HOME=/cache
      - TZ=Europe/Berlin
    volumes:
      # Backrest state
      - ./volumes/backrest/config:/config
      - ./volumes/backrest/data:/data
      - ./volumes/backrest/cache:/cache
      # Shared with the bash script so both tools encrypt with the same key.
      - ./.restic-password:/restic-password:ro
      # Source data to back up (read-only). Backrest plans target paths
      # under /source. Named docker volumes live under /docker-volumes.
      - /home/server/projects:/source:ro
      - /var/lib/docker/volumes:/docker-volumes:ro
      # SSH keys + config so SFTP repos authenticate the same way the host does.
      - /root/.ssh:/root/.ssh:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9898/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "resq.enable=true"
